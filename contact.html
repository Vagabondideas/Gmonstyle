      rel="stylesheet"
    />

    <title>Gmonstyle_v5</title>
  </head>

  <body>
    <header class="main-header">
      <div class="logo-div">
        <a href="index.html"
          ><img class="logo-header-img" src="images/LogoName.png"
        /></a>
      </div>
      <nav>
        <a class="menue menue1" href="about.html">À propos</a>
        <a class="menue menue2" href="services.html">Services</a>
        <a class="menue menue3" href="contact.html">Contact</a>
        <!-- <button class="btn-clients" href="# ">Clients</button> -->
      </nav>
    </header>

    <!-- IMAGE WITH CONTACT INFO -->
    <div class="contact-container">
      <img class="contact-img" src="images/Contact_email_v3.png" />
    </div>

    <!-- FORM CONTAINER -->

    <div class="form-container">
      <form
        class="contact-form"
        action="https://formsubmit.co/va2aj@hotmail.com"
        method="post"
      >
        <!-- HONEYPOT -->
        <input type="text" name="_honey" style="display: none" />
        <!-- Disable Captcha -->
        <input type="hidden" name="_captcha" value="false" />
        <!-- Re-direct to website after sbmit -->
        <input
          type="hidden"
          name="_next"
          value="https://vagabondideas.github.io/formsubmitdemo//success.html"
        />

        <!-- Resume normal code creating label field -->

        <div class="form-group">
          <label for="name" class="form-label">Votre nom:</label>
          <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            placeholder="Votre nom"
            tabindex="1"
            required
          />
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Votre courriel</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="courriel@gmail.com"
            tabindex="2"
            required
          />
        </div>
        <div class="form-group">
          <label for="sujet" class="form-label">Sujet</label>
          <input
            type="text"
            class="form-control"
            id="sujet"
            name="sujet"
            placeholder="Therapie de la penderie"
            tabindex="3"
          />
        </div>
        <div class="form-group">
          <label for="message" class="form-label">Message</label>
          <textarea
            rows="10"
            cols="50"
            class="form-control"
            id="message"
            name="message"
            placeholder="Bonjour..."
            tabindex="4"
            required
          ></textarea>
        </div>
        <div class="center-submit">
          <button type="submit" class="btn-submit-msg">Envoyez</button>
        </div>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
